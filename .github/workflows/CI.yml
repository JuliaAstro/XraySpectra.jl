name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Run tests
        shell: julia --project=. --color=yes {0}
        run: |
          import Pkg
          Pkg.test()
