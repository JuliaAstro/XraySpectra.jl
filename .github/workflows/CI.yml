name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: JuliaAstro/Spectra.jl
          path: Spectra.jl

      - uses: actions/checkout@v6
        with:
          repository: JuliaAstro/FITSFiles.jl
          path: FITSFiles.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Set up local dependencies
        shell: julia --project=. --color=yes {0}
        run: |
          import Pkg
          Pkg.develop(path="Spectra.jl")
          Pkg.develop(path="FITSFiles.jl")
          Pkg.instantiate()

      - name: Run tests
        shell: julia --project=. --color=yes {0}
        run: |
          import Pkg
          Pkg.test()
